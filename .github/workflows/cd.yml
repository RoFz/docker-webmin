name: CD

# Builds and pushes the Docker image to Docker Hub when a release is published.
#
# Requires the following repository secrets and variables:
#   DOCKERHUB_TOKEN    — Docker Hub access token (read/write) [secret]
#   DOCKERHUB_USERNAME — Docker Hub username [variable]
#
# To pass additional values to the Dockerfile at build time:
#   build-args (ARGs and repo variables):
#     Add entries under build-args in the "Build and push" step:
#       MY_ARG=${{ vars.MY_VAR }}
#   secrets (BuildKit secret mounts — never pass secrets via build-args):
#     Add entries under secrets in the "Build and push" step:
#       my_secret=${{ secrets.MY_SECRET }}
#     Then consume in the Dockerfile with: RUN --mount=type=secret,id=my_secret ...
on:
  release:
    types: [created]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/docker-webmin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OCI_CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            OCI_VERSION=${{ steps.meta.outputs.version }}
            OCI_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Add Docker Hub reference to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          image="${{ vars.DOCKERHUB_USERNAME }}/docker-webmin"
          version="${{ steps.meta.outputs.version }}"
          tmp="$(mktemp)"
          gh release view "$tag" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq .body > "$tmp"
          cat >> "$tmp" <<EOF

          ---

          ## Docker Hub

          \`\`\`
          docker pull ${image}:${version}
          \`\`\`

          https://hub.docker.com/r/${image}
          EOF
          gh release edit "$tag" \
            --repo "${{ github.repository }}" \
            --notes-file "$tmp" \
            --draft=false
