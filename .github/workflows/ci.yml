name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute build metadata
        id: build-meta
        shell: bash
        run: |
          set -euo pipefail
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "version=$(<version.txt)" >> "$GITHUB_OUTPUT"

      - name: Docker build checks
        run: docker build --check .

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: image:ci
          load: true
          build-args: |
            OCI_CREATED=${{ steps.build-meta.outputs.created }}
            OCI_VERSION=${{ steps.build-meta.outputs.version }}
            OCI_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          container_name="docker-webmin-ci"
          secret_file="$(mktemp)"
          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            rm -f "$secret_file"
          }
          trap cleanup EXIT

          printf '%s' 'TempPassword123!' > "$secret_file"
          chmod 600 "$secret_file"

          docker run -d \
            --name "$container_name" \
            -p 10080:10000 \
            -e WEBMIN_INITIAL_ROOT_PASSWORD_FILE=/run/secrets/webmin-bootstrap-password \
            -v "$secret_file:/run/secrets/webmin-bootstrap-password:ro" \
            image:ci >/dev/null

          for _ in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$container_name")"
            if [ "$status" = healthy ]; then
              break
            fi
            if [ "$status" = unhealthy ]; then
              echo "Container became unhealthy" >&2
              docker logs "$container_name"
              exit 1
            fi
            sleep 2
          done

          status="$(docker inspect --format '{{.State.Health.Status}}' "$container_name")"
          if [ "$status" != healthy ]; then
            echo "Timed out waiting for healthy container" >&2
            docker logs "$container_name"
            exit 1
          fi

          curl -kI --fail --max-time 15 https://127.0.0.1:10080/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: image:ci
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always() && github.event.pull_request.head.repo.fork != true
        with:
          sarif_file: trivy.sarif
          category: trivy
