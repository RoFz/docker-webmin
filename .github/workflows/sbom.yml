name: SBOM

# Generates a Software Bill of Materials for the Docker image and submits it
# to the GitHub dependency graph so Dependabot alerts stay current.
on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  sbom:
    name: Generate & Submit SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: image:sbom
          load: true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: image:sbom
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Submit SBOM to GitHub dependency graph
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: sbom.spdx.json
