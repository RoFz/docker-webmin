name: SBOM

# Generates a Software Bill of Materials for the Docker image and submits it
# to the GitHub dependency graph so Dependabot alerts stay current.
on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  sbom:
    name: Generate & Submit SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: image:sbom
          load: true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: image:sbom
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Submit SBOM to GitHub dependency graph
        uses: advanced-security/spdx-dependency-submission-action@v0.1.1
        with:
          filePath: sbom.spdx.json
